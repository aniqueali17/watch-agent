# Runs on every push and pull request to main. Two jobs:
#   1. test  — installs dependencies, runs pytest
#   2. build — builds the Docker image to confirm the Dockerfile works
# Both must pass for the CI status to go green.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Build the Docker image
        # No API keys needed — that's a hard requirement from the spec.
        run: docker build -t watch-agent:ci .